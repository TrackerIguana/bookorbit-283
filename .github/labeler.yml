server:
  - changed-files:
      - any-glob-to-any-file: "server/**"

client:
  - changed-files:
      - any-glob-to-any-file: "client/**"

packages:
  - changed-files:
      - any-glob-to-any-file: "packages/**"

docs:
  - changed-files:
      - any-glob-to-any-file: "docs/**"
      - any-glob-to-any-file: "*.md"

ci:
  - changed-files:
      - any-glob-to-any-file: ".github/**"
      - any-glob-to-any-file: "scripts/**"
      - any-glob-to-any-file: "docker/**"
      - any-glob-to-any-file: "Dockerfile"
      - any-glob-to-any-file: "docker-compose*.yml"

dependencies:
  - changed-files:
      - any-glob-to-any-file: "package.json"
      - any-glob-to-any-file: "pnpm-lock.yaml"
      - any-glob-to-any-file: "pnpm-workspace.yaml"
      - any-glob-to-any-file: "server/package.json"
      - any-glob-to-any-file: "client/package.json"
      - any-glob-to-any-file: "packages/*/package.json"
